<!-- @dsCard group="Website" viewport="1280x820" name="PEACE — Marketing Site" subtitle="Full landing page: hero, peace facts, terms, steps, scoreboard, FAQ" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>$PEACE — At Long Last, Peace</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<style>
  /* Font override — matched to gettrumpmemes.com: heavy grotesque display caps + clean sans.
     Closest Google Fonts: Archivo Black / Archivo (their exact faces are licensed/custom). */
  @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Archivo+Black&display=swap');
  :root {
    --font-display: 'Archivo Black', 'Archivo', 'Arial Black', sans-serif;
    --font-body: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    --font-ui: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
  }
</style>
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); color: var(--text-body); }

  @keyframes peace-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .peace-marquee { animation: peace-marquee 42s linear infinite; }
  .peace-marquee-slow { animation: peace-marquee 60s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .peace-marquee, .peace-marquee-slow { animation: none; }
  }

  @media (max-width: 900px) {
    .peace-hero-grid, .peace-facts-grid, .peace-terms-grid { grid-template-columns: 1fr !important; }
    .peace-steps-grid { grid-template-columns: 1fr !important; }
    .peace-footer-grid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Parts.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="PeaceFacts.jsx"></script>
<script type="text/babel" src="Terms.jsx"></script>
<script type="text/babel" src="Steps.jsx"></script>
<script type="text/babel" src="Scoreboard.jsx"></script>
<script type="text/babel" src="Collectible.jsx"></script>
<script type="text/babel" src="Community.jsx"></script>
<script type="text/babel" src="Dispatch.jsx"></script>
<script type="text/babel" data-presets="react">
  const {
    TopTicker, MedallionMarquee, Header, Hero, AccordBand,
    PeaceFacts, Terms, Steps, Scoreboard, QuoteBand,
    CommunityBanner, Faq, Dispatch, Footer, Collectible,
  } = window.PeaceSite;

  function App() {
    const [active, setActive] = React.useState('top');
    const [expanded, setExpanded] = React.useState(false);

    const onNav = (id) => {
      setActive(id);
      const el = document.getElementById(id);
      if (el) window.scrollTo({ top: Math.max(0, el.getBoundingClientRect().top + window.scrollY - 64), behavior: 'smooth' });
    };

    return (
      <>
        <TopTicker />
        <Header onNav={onNav} active={active} />
        <Hero onNav={onNav} />
        <MedallionMarquee />
        <AccordBand expanded={expanded} onToggle={() => setExpanded((v) => !v)} />
        <PeaceFacts />
        <Terms />
        <Steps onNav={onNav} />
        <Scoreboard />
        <QuoteBand />
        <Collectible />
        <Dispatch />
        <CommunityBanner onNav={onNav} />
        <Faq />
        <Footer onNav={onNav} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
